<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsPulse Convocazione</title>

<style>

body{
margin:0;
padding:0;
background:#efefef;
font-family:Arial,Helvetica,sans-serif;
}

.card{
max-width:700px;
margin:40px auto;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
background:#0b8b7d;
color:white;
padding:30px;
text-align:center;
}

.header h1{
margin:0;
font-size:34px;
}

.header h2{
margin-top:10px;
font-weight:400;
}

.info{
padding:25px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:18px;
}

.vs{
text-align:center;
padding:30px;
font-size:32px;
font-weight:bold;
}

.section{
padding:25px;
}

.section h3{
border-bottom:2px solid #0b8b7d;
padding-bottom:10px;
}

.player{
padding:10px;
border-bottom:1px solid #ececec;
font-size:18px;
}

.footer{
padding:25px;
text-align:center;
color:#777;
font-size:14px;
}

button{
width:100%;
padding:18px;
border:none;
background:#0b8b7d;
color:white;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#097467;
}

</style>

</head>

<body>

<div class="card">

<div class="header">
<h1>SPORTSPULSE</h1>
<h2>CONVOCAZIONE UFFICIALE</h2>
</div>

<div class="info">

<div class="row">
<b>Data</b>
<span id="data"></span>
</div>

<div class="row">
<b>Competizione</b>
<span id="competizione"></span>
</div>

</div>

<div class="vs">

SPORTSPULSE

<br>VS<br>

<span id="avversario"></span>

</div>

<div class="section">

<h3>CONVOCATI</h3>

<div id="lista"></div>

</div>

<button onclick="window.print()">
🖨️ STAMPA / SALVA PDF
</button>

<div class="footer">
Generated by SportsPulse
</div>

</div>

<script>

const url=new URLSearchParams(window.location.search);

const data=url.get("data") || new Date().toLocaleDateString("it-IT");

const competizione=url.get("competizione") || "Campionato";

const avversario=url.get("avversario") || "AVVERSARIO";

const convocati=url.get("convocati") || "";

document.getElementById("data").textContent=data;
document.getElementById("competizione").textContent=competizione;
document.getElementById("avversario").textContent=avversario;

const lista=document.getElementById("lista");

if(convocati===""){

lista.innerHTML="<div class='player'>Nessun convocato</div>";

}else{

convocati.split(",").forEach(function(nome){

lista.innerHTML+=<div class="player">${nome.trim()}</div>;

});

}

</script>

</body>
</html>
