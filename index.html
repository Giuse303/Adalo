<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SportsPulse Convocazione</title>

<style>

body{
margin:0;
padding:0;
background:#efefef;
font-family:Arial,Helvetica,sans-serif;
}

.card{
max-width:750px;
margin:40px auto;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
background:#0b8b7d;
color:#fff;
padding:30px;
text-align:center;
}

.header h1{
margin:0;
font-size:34px;
}

.header h2{
margin-top:10px;
font-weight:400;
}

.info{
padding:25px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:18px;
}

.match{
text-align:center;
padding:30px;
font-size:34px;
font-weight:bold;
color:#444;
}

.section{
padding:25px;
}

.section h3{
border-bottom:2px solid #0b8b7d;
padding-bottom:10px;
}

.player{
padding:12px;
border-bottom:1px solid #ececec;
font-size:18px;
}

.footer{
padding:20px;
text-align:center;
color:#888;
font-size:14px;
}

button{
width:100%;
padding:18px;
background:#0b8b7d;
border:none;
color:white;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#08786d;
}

</style>

</head>

<body>

<div class="card">

<div class="header">

<h1>CONVOCAZIONE UFFICIALE</h1>

</div>

<div class="info">

<div class="row">

<b>Data</b>

<span id="data"></span>

</div>

<div class="row">

<b>Competizione</b>

<span id="competizione"></span>

</div>

</div>

<div class="match" id="match"></div>

<div class="section">

<h3>CONVOCATI</h3>

<div id="lista"></div>

</div>

<button onclick="window.print()">

🖨️ STAMPA / SALVA PDF

</button>

<div class="footer">

Generated by SportsPulse

</div>

</div>

<script>

const p=new URLSearchParams(window.location.search);

const data=p.get("data") || new Date().toLocaleDateString("it-IT");

const competizione=p.get("competizione") || "";

const match=p.get("match") || "";

const convocati=p.get("convocati") || "";

document.getElementById("data").innerHTML=data;
document.getElementById("competizione").innerHTML=competizione;
document.getElementById("match").innerHTML=match;

const lista=document.getElementById("lista");

if(convocati.trim()==""){

lista.innerHTML="<div class='player'>Nessun convocato</div>";

}else{

convocati.split(",").forEach(function(nome){

const div=document.createElement("div");

div.className="player";

div.innerHTML=nome.trim();

lista.appendChild(div);

});

}

</script>

</body>

</html>
